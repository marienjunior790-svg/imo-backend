name: Backend CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: immotec
          POSTGRES_PASSWORD: immotec_dev
          POSTGRES_DB: immo_tec_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U immotec -d immo_tec_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://immotec:immotec_dev@localhost:5432/immo_tec_test?schema=public
      JWT_ACCESS_SECRET: test-jwt-access-secret-key-32chars!!
      JWT_REFRESH_SECRET: test-jwt-refresh-secret-key-32chars!
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      N8N_ENABLED: "false"
      N8N_API_KEY: immo-tec-automation-key-32chars-min
      DEFAULT_CURRENCY: XAF
      DEFAULT_CITY: Brazzaville
      DEFAULT_COUNTRY: CG
      RUN_DB_TESTS: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npx prisma db seed
      - run: npm test -- --coverage --coverageReporters=text-summary --runInBand
      - run: npm run build
